workflows:
  android-release:
    name: Android APK
    max_build_duration: 30
    environment:
      flutter: 3.19.6
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release --split-per-abi
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
